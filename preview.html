<!DOCTYPE html>
<html>
<head>
  <title>Horse Drawing Preview</title>
  <style>
    body { 
      display: flex; 
      flex-direction: column;
      align-items: center;
      justify-content: center; 
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 {
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .preview-container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    img { 
      max-width: 100%;
      display: block;
      border-radius: 8px;
    }
    p {
      color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🐴 Beautiful Horse Preview</h1>
  <div class="preview-container">
    <img src="./horse-output.svg" alt="Horse Drawing"/>
  </div>
  <p>SVG Preview - This will be converted to TurtleScript</p>
</body>
</html>

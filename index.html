<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover puts the page under the iOS home-indicator area so
      we can paint to the edges; env(safe-area-inset-*) in CSS then pads
      interactive content back into the visible rect.
      maximum-scale locks the visual pinch-zoom off: the canvas has its own
      pinch-zoom and input fields rely on font-size >= 16px to stop iOS's
      focus-auto-zoom — so letting the browser re-zoom the whole page would
      fight the app's own gestures.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#faf8f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Favicon + iOS home-screen icon use the official KTurtle logo
         (Wikimedia Commons, File:KTurtle_logo.svg). One asset serves all
         modern browsers as a vector icon. -->
    <!-- Relative paths (no leading slash) so the same index.html works
         from http:// in dev, file:// in Tauri, and android-asset:// in
         Capacitor. A leading slash would resolve to the device root on
         Android and break the app. -->
    <link rel="icon" type="image/svg+xml" href="kturtle-logo.svg" />
    <link rel="apple-touch-icon" href="kturtle-logo.svg" />
    <title>KTurtle — a quiet place to draw with code</title>
    <!-- Self-hosted fonts. The bundle under /public/fonts/ is generated
         by scripts/fetch-fonts.ps1 so the app works fully offline. -->
    <link rel="stylesheet" href="fonts/fonts.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

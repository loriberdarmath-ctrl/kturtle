<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elephant Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            color: #4ade80;
        }
        .preview-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .info {
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🐘 Elephant Preview</h1>
    <div class="preview-container">
        <img src="elephant.svg" alt="Elephant Drawing" />
    </div>
    <p class="info">This is the current elephant design. Refresh to see updates.</p>
</body>
</html>
